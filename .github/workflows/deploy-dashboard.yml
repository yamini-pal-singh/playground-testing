name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'reports/Playground-Report.html'
      - 'reports/playground-runs.json'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pages directory
        run: |
          mkdir -p pages-output/reports
          cp reports/Playground-Report.html pages-output/index.html
          cp reports/Playground-Report.html pages-output/Playground-Report.html
          cp reports/Playground-Report.html pages-output/reports/Playground-Report.html
          cp reports/playground-runs.json pages-output/playground-runs.json
          cp reports/playground-runs.json pages-output/reports/playground-runs.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages-output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
